<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amor de Mãe 3D — Peças Personalizadas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Nunito', sans-serif; background: #fdf9f9; color: #3D2B2B; -webkit-font-smoothing: antialiased; }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    @keyframes slideInRight {
      from { transform: translateX(120%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Responsive grid helpers */
    @media (max-width: 1024px) {
      .products-grid { grid-template-columns: repeat(3, 1fr) !important; }
      .value-grid { grid-template-columns: repeat(3, 1fr) !important; }
    }
    @media (max-width: 768px) {
      .products-grid { grid-template-columns: repeat(2, 1fr) !important; }
      .value-grid { grid-template-columns: 1fr !important; }
      .hero-grid { grid-template-columns: 1fr !important; }
      .hero-visual { display: none !important; }
      .product-detail-grid { grid-template-columns: 1fr !important; }
      .cart-grid { grid-template-columns: 1fr !important; }
      .testimonials-grid { grid-template-columns: 1fr !important; }
      .desktop-nav { display: none !important; }
      .cta-nav { display: none !important; }
    }
    @media (max-width: 480px) {
      .products-grid { grid-template-columns: 1fr !important; }
    }
    @media (min-width: 769px) {
      .hamburger { display: none !important; }
    }

    input:focus, textarea:focus, select:focus {
      border-color: #D29B9B !important;
      box-shadow: 0 0 0 3px rgba(210,155,155,0.15) !important;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #fdf9f9; }
    ::-webkit-scrollbar-thumb { background: #D29B9B; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>

  <!-- Data -->
  <script src="data.js"></script>

  <!-- Components (order matters) -->
  <script type="text/babel" src="components/ProductImage.jsx"></script>
  <script type="text/babel" src="components/UI.jsx"></script>
  <script type="text/babel" src="components/PersonalizationModal.jsx"></script>
  <script type="text/babel" src="components/Navbar.jsx"></script>
  <script type="text/babel" src="components/ProductCard.jsx"></script>
  <script type="text/babel" src="components/Landing.jsx"></script>
  <script type="text/babel" src="components/Catalog.jsx"></script>
  <script type="text/babel" src="components/ProductDetail.jsx"></script>
  <script type="text/babel" src="components/Cart.jsx"></script>
  <script type="text/babel" src="components/Favorites.jsx"></script>
  <script type="text/babel" src="components/AdminLogin.jsx"></script>
  <script type="text/babel" src="components/AdminPanel.jsx"></script>

  <!-- Main App -->
  <script type="text/babel" src="App.jsx"></script>
</body>
</html>
